title: Insight Notes
description: Exploring the invisible architectures where code meets regulation.
url: "https://insight.ale-saglia.com"
baseurl: ""
author:
  name: Alessandro Saglia
  url: https://ale-saglia.com

markdown: kramdown
permalink: pretty

# Keep _posts available but optional.
collections: {}

defaults:
  - scope:
      path: "src/infrastructure"
      type: "pages"
    values:
      layout: article
  - scope:
      path: "src/digital-governance"
      type: "pages"
    values:
      layout: article
  - scope:
      path: "src/frontier"
      type: "pages"
    values:
      layout: article
  - scope:
      path: "src/_general"
      type: "pages"
    values:
      layout: article
  - scope:
      path: ""
      type: "posts"
    values:
      layout: article

plugins:
  - jekyll-sitemap

exclude:
  - README.md
  - build-local.md
  - scripts/
  - .github/
  - _config.local.yml
  - LICENSE
