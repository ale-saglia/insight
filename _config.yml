title: Insight Notes
description: Notes on AI, governance, and infrastructure systems.
url: "https://insight.ale-saglia.com"
baseurl: ""

markdown: kramdown
permalink: pretty

# Keep _posts available but optional.
collections: {}

defaults:
  - scope:
      path: "src/homelab"
      type: "pages"
    values:
      layout: article
      category: homelab
      permalink: /homelab/:name/
  - scope:
      path: "src/digital-health"
      type: "pages"
    values:
      layout: article
      category: digital-health
      permalink: /digital-health/:name/
  - scope:
      path: "src/general"
      type: "pages"
    values:
      layout: article
      category: general
      permalink: /general/:name/
  - scope:
      path: ""
      type: "posts"
    values:
      layout: article

plugins:
  - jekyll-sitemap
  - jekyll-feed

exclude:
  - README.md
  - build-local.md
  - scripts/
  - .github/
  - _config.local.yml
  - LICENSE
