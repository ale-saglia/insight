name: Check version alignment

on:
  push:
    paths:
      - 'versions.env'
      - '.devcontainer/Dockerfile'
  pull_request:
    paths:
      - 'versions.env'
      - '.devcontainer/Dockerfile'

jobs:
  check-versions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check version alignment
        run: |
          set -e
          # Extract versions from versions.env
          RUBY_VERSION_ENV=$(grep '^RUBY_VERSION=' versions.env | cut -d'=' -f2)
          NODE_VERSION_ENV=$(grep '^NODE_VERSION=' versions.env | cut -d'=' -f2)
          BUNDLER_VERSION_ENV=$(grep '^BUNDLER_VERSION=' versions.env | cut -d'=' -f2)

          # Extract versions from Dockerfile
          RUBY_VERSION_DOCKER=$(grep '^ARG RUBY_VERSION=' .devcontainer/Dockerfile | cut -d'=' -f2 | cut -d'-' -f1)
          NODE_VERSION_DOCKER=$(grep 'NODE_VERSION' .devcontainer/Dockerfile | grep 'setup_' | sed -E 's/.*setup_([0-9]+).x.*/\1/')
          BUNDLER_VERSION_DOCKER=$(grep 'gem install bundler:' .devcontainer/Dockerfile | sed -E 's/.*bundler:([0-9.]+).*/\1/')

          echo "RUBY_VERSION: $RUBY_VERSION_ENV (env) vs $RUBY_VERSION_DOCKER (Dockerfile)"
          echo "NODE_VERSION: $NODE_VERSION_ENV (env) vs $NODE_VERSION_DOCKER (Dockerfile)"
          echo "BUNDLER_VERSION: $BUNDLER_VERSION_ENV (env) vs $BUNDLER_VERSION_DOCKER (Dockerfile)"

          if [ "$RUBY_VERSION_ENV" != "$RUBY_VERSION_DOCKER" ]; then
            echo "::error ::RUBY_VERSION is not aligned between versions.env and Dockerfile"
            exit 1
          fi
          if [ "$NODE_VERSION_ENV" != "$NODE_VERSION_DOCKER" ]; then
            echo "::error ::NODE_VERSION is not aligned between versions.env and Dockerfile"
            exit 1
          fi
          if [ "$BUNDLER_VERSION_ENV" != "$BUNDLER_VERSION_DOCKER" ]; then
            echo "::error ::BUNDLER_VERSION is not aligned between versions.env and Dockerfile"
            exit 1
          fi

          echo "All versions are aligned."
