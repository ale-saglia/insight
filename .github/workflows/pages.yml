name: Deploy Jekyll site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_og_generation:
        description: 'Skip OG image generation (deploy without images)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read versions from Dockerfile
        id: versions
        run: |
          echo "ruby=$(grep '^ARG RUBY_VERSION=' .devcontainer/Dockerfile | cut -d= -f2)" >> $GITHUB_OUTPUT
          echo "node=$(grep '^ARG NODE_VERSION=' .devcontainer/Dockerfile | cut -d= -f2)" >> $GITHUB_OUTPUT

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ steps.versions.outputs.ruby }}

      - name: Install Ruby gems
        run: bundle install

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.versions.outputs.node }}
          cache: 'npm'
          cache-dependency-path: scripts/og-image-gen/package-lock.json

      - name: Ensure article front matter
        run: bash scripts/ensure-frontmatter.sh

      - name: Generate OG images
        if: ${{ github.event.inputs.skip_og_generation != 'true' }}
        run: bash scripts/generate-og-images.sh

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        run: bundle exec jekyll build --config _config.yml
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
