name: Deploy Pelican site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_og_generation:
        description: 'Skip OG image generation (deploy without images)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read versions from Dockerfile
        id: versions
        run: |
          echo "python=$(grep '^ARG PYTHON_VERSION=' .devcontainer/Dockerfile | cut -d= -f2)" >> $GITHUB_OUTPUT
          echo "node=$(grep '^ARG NODE_VERSION=' .devcontainer/Dockerfile | cut -d= -f2)" >> $GITHUB_OUTPUT

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ steps.versions.outputs.python }}
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.versions.outputs.node }}
          cache: 'npm'
          cache-dependency-path: scripts/og-image-gen/package-lock.json

      - name: Ensure article front matter
        run: bash scripts/ensure-frontmatter.sh

      - name: Generate OG images
        if: ${{ github.event.inputs.skip_og_generation != 'true' }}
        run: bash scripts/generate-og-images.sh

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build with Pelican
        run: pelican --settings publishconf.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
