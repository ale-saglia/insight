name: Deploy Pelican site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read versions from Dockerfile
        id: versions
        run: |
          echo "python=$(grep '^ARG PYTHON_VERSION=' .devcontainer/Dockerfile | cut -d= -f2)" >> $GITHUB_OUTPUT

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ steps.versions.outputs.python }}
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install system fonts
        run: sudo apt-get install -y --no-install-recommends fonts-dejavu-core

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Ensure article front matter
        run: python scripts/ensure_frontmatter.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build with Pelican
        run: pelican --settings publishconf.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
