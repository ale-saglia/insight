name: Deploy Pelican site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install uv
        run: pip install uv

      - name: Install system fonts
        run: sudo apt-get install -y --no-install-recommends fonts-dejavu-core

      - name: Install Python dependencies
        run: uv pip install --require-hashes -r requirements-dev.txt --system

      - name: Ensure article front matter
        run: python scripts/ensure_frontmatter.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build with Pelican
        run: pelican --settings publishconf.py

      - name: Start check server
        run: |
          python -m http.server 4567 --directory _site --bind 127.0.0.1 &
          sleep 2

      - name: Check internal links
        run: |
          linkchecker \
            --no-warnings \
            --ignore-url='^https?://(?!127\.0\.0\.1)' \
            --ignore-url='^mailto:' \
            http://127.0.0.1:4567/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
