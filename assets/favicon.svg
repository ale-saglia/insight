  </defs>
  
  <rect class="fav-bg" x="4" y="4" width="56" height="56" rx="12" stroke-width="0.5"/>
  <line class="fav-line" x1="32" y1="7" x2="32" y2="57" stroke-width="3.5" opacity="0.5" stroke-linecap="round"/>
  <line class="fav-line" x1="7" y1="32" x2="57" y2="32" stroke-width="3.5" opacity="0.5" stroke-linecap="round"/>
  <line class="fav-line" x1="14" y1="14" x2="50" y2="50" stroke-width="3.5" opacity="0.32" stroke-linecap="round"/>
  <line class="fav-line" x1="50" y1="14" x2="14" y2="50" stroke-width="3.5" opacity="0.32" stroke-linecap="round"/>
  <circle class="fav-dot" cx="32" cy="32" r="5"/>
</svg>
