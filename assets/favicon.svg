<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .fav-bg { fill: #ffffff; stroke: #e6e8eb; }
      .fav-line { stroke: #1b1f23; }
      .fav-dot { fill: #1b1f23; }
      
      @media (prefers-color-scheme: dark) {
        .fav-bg { fill: #0d1117; stroke: #30363d; }
        .fav-line { stroke: #e6edf3; }
        .fav-dot { fill: #e6edf3; }
