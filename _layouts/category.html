---
layout: default
---

<article class="article">
  <header class="article-header">
    <h1>{{ page.title }}</h1>
  </header>

  {{ content }}

  <p class="section-label">Articles in this category</p>

  <ul class="article-list">
    {% for article in site.pages %}
      {% if article.category == page.category and article.date %}
        <li>
          <a href="{{ article.url | relative_url }}">{{ article.title }}</a>
          <span class="article-meta">{{ article.date | date: "%d %b %Y" }}</span>
        </li>
      {% endif %}
    {% endfor %}
  </ul>
</article>
