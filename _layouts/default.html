<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}" />
    <link rel="stylesheet" href="{{ '/assets/styles.css' | relative_url }}" />
  </head>
  <body>
    <header class="site-header">
      <div class="wrap">
        <p class="site-title"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></p>
        <p class="site-subtitle">Notes on AI, governance, and infrastructure systems.</p>
        {% include nav.html %}
      </div>
    </header>

    <main class="wrap" aria-label="Content">
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="wrap">
        <p class="site-footer-note">Published occasionally. Written for clarity over volume.</p>
        <p class="site-footer-meta">
          Maintained by Alessandro Saglia
          {% if site.github.repository_url %}
            · <a href="{{ site.github.repository_url }}">GitHub</a>
          {% else %}
            · <a href="https://github.com/ale-saglia/insight">GitHub</a>
          {% endif %}
        </p>
      </div>
    </footer>
  </body>
</html>
