---
layout: default
---
<article class="article">
  <header class="article-header">
    {% if page.category and page.category != 'general' %}
      <p class="article-category">{{ page.category }}</p>
    {% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.created %}
      <p class="article-meta">{{ page.created | date: "%d %b %Y" }}</p>
    {% endif %}
  </header>

  {{ content }}
  
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": "{{ page.title }}",
    "description": "{{ page.excerpt | strip_html }}",
    "datePublished": "{{ page.created | date_to_xmlschema }}",
    {% if page.modified %}
    "dateModified": "{{ page.modified | date_to_xmlschema }}",
    {% endif %}
    "url": "{{ page.url | absolute_url }}",
    "author": {
      "@type": "Person",
      "name": "Alessandro Saglia"
    },
    "articleSection": "{{ page.category | capitalize }}"
  }
  </script>

  <nav class="article-nav" id="article-nav">
    <a href="javascript:history.back()" class="article-nav-link" id="back-link" style="display: none;">← Back to articles</a>
  </nav>

  <script>
    (function() {
      const backLink = document.getElementById('back-link');
      const referrer = document.referrer;
      const currentDomain = window.location.hostname;
      
      // Check if referrer is from the same domain
      if (referrer && referrer.includes(currentDomain)) {
        // Check if referrer is from a category page (not direct external or home)
        if (referrer.includes('/general/') || referrer.includes('/homelab/') || referrer.includes('/digital-health/') || referrer.includes('/archive')) {
          backLink.style.display = 'inline-block';
        }
      }
    })();
  </script>
</article>
